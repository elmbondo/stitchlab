<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StitchLab — Generating</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/generating.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="generating-container">
        <div class="hook-animation">
            <svg class="hook-svg" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                <path class="hook-path" d="M50 10 L50 90 Q50 130 20 130 Q5 130 5 115 Q5 100 20 100 Q35 100 35 115" 
                      fill="none" stroke="#E8735A" stroke-width="6" 
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="yarn-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <div class="status-text" id="statusText">Counting stitches...</div>

        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="yarn-lines">
            <div class="yarn-line"></div>
            <div class="yarn-line"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/generating.js') }}"></script>
</body>
</html>
